<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird Arcade</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #000;
            color: #fff;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        h1 {
            color: #ff9900;
            margin: 5px 0;
            font-size: 24px;
            letter-spacing: 2px;
            text-shadow: 2px 2px #000;
        }
        #gameCanvas {
            background-color: #70c5ce; /* Official Arcade Sky Blue */
            border: 6px double #fff;
            display: block;
        }
        .controls {
            margin-top: 12px;
            font-size: 14px;
            color: #ffcc00;
            text-align: center;
        }
        .back-btn {
            margin-top: 15px;
            color: #a5a5a5;
            text-decoration: none;
            font-size: 14px;
        }
        .back-btn:hover { color: #fff; }
    </style>
</head>
<body>

    <h1>FLAPPY BIRD ARCADE</h1>
    <canvas id="gameCanvas" width="768" height="440"></canvas>
    <div class="controls">SPACEBAR or UP ARROW = Flap Wing | R = Restart Challenge</div>
    <a href="index.html" class="back-btn">« RETURN TO MENU</a>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Game Configuration Variables
        let score = 0;
        let highScore = 0;
        let gameOver = false;
        let groundScrollX = 0;
        const groundHeight = 56;
        const groundY = canvas.height - groundHeight;

        // Bird Physics Configuration
        const bird = {
            x: 180,
            y: 180,
            radius: 14,
            gravity: 0.42,
            velocity: 0,
            jumpForce: -6.8,
            rotation: 0
        };

        // Pipe Management Configuration
        let pipes = [];
        let spawnTimer = 0;
        const pipeGap = 135;
        const pipeWidth = 72;
        const pipeSpeed = 3.2;

        window.addEventListener("keydown", (e) => {
            if ((e.code === "Space" || e.code === "ArrowUp") && !gameOver) {
                bird.velocity = bird.jumpForce;
                bird.rotation = -0.35; 
            }
            if (e.code === "KeyR" && gameOver) {
                resetGame();
            }
        });

        function resetGame() {
            score = 0;
            gameOver = false;
            pipes = [];
            bird.y = 180;
            bird.velocity = 0;
            bird.rotation = 0;
            spawnTimer = 0;
            groundScrollX = 0;
            gameLoop();
        }

        function updatePhysics() {
            if (gameOver) return;

            bird.velocity += bird.gravity;
            bird.y += bird.velocity;

            if (bird.velocity > 3) {
                bird.rotation = Math.min(bird.rotation + 0.08, Math.PI / 2);
            } else if (bird.velocity < 0) {
                bird.rotation = Math.max(bird.rotation - 0.02, -0.4);
            }

            if (bird.y + bird.radius >= groundY) {
                bird.y = groundY - bird.radius;
                gameOver = true;
            }
            if (bird.y - bird.radius <= 0) {
                bird.y = bird.radius;
                bird.velocity = 0.5; 
            }

            groundScrollX = (groundScrollX - pipeSpeed) % 24;

            spawnTimer++;
            if (spawnTimer % 90 === 0) {
                let minHeight = 40;
                let maxHeight = groundY - pipeGap - 40;
                let topHeight = Math.floor(Math.random() * (maxHeight - minHeight + 1)) + minHeight;
                
                pipes.push({
                    x: canvas.width,
                    top: topHeight,
                    passed: false
                });
                spawnTimer = 0;
            }

            for (let i = pipes.length - 1; i >= 0; i--) {
                pipes[i].x -= pipeSpeed;

                let bLeft = bird.x - bird.radius + 3;
                let bRight = bird.x + bird.radius - 3;
                let bTop = bird.y - bird.radius + 3;
                let bBottom = bird.y + bird.radius - 3;

                if (bRight > pipes[i].x && bLeft < pipes[i].x + pipeWidth) {
                    if (bTop < pipes[i].top || bBottom > pipes[i].top + pipeGap) {
                        gameOver = true;
                    }
                }

                if (pipes[i].x + pipeWidth < bird.x && !pipes[i].passed) {
                    score++;
                    if (score > highScore) highScore = score;
                    pipes[i].passed = true;
                }

                if (pipes[i].x < -pipeWidth) {
                    pipes.splice(i, 1);
                }
            }
        }

        function drawBird() {
            ctx.save();
            ctx.translate(bird.x, bird.y);
            ctx.rotate(bird.rotation);

            ctx.lineWidth = 2;
            ctx.strokeStyle = "#000";

            ctx.fillStyle = "#f1c40f";
            ctx.beginPath();
            ctx.arc(0, 0, bird.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = "#f39c12";
            ctx.beginPath();
            ctx.ellipse(-6, 2, 8, 5, Math.PI / 6, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = "#fff";
            ctx.beginPath();
            ctx.arc(5, -4, 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = "#000";
            ctx.beginPath();
            ctx.arc(6, -4, 2, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "#e67e22";
            ctx.beginPath();
            ctx.moveTo(11, -2);
            ctx.lineTo(21, 2);
            ctx.lineTo(11, 7);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            ctx.restore();
        }

        function drawPipes() {
            for (let i = 0; i < pipes.length; i++) {
                let p = pipes[i];
                ctx.lineWidth = 2.5;
                ctx.strokeStyle = "#000";

                ctx.fillStyle = "#73bf2e"; 
                ctx.fillRect(p.x, 0, pipeWidth, p.top);
                ctx.strokeRect(p.x, -4, pipeWidth, p.top + 4);
                
                ctx.fillStyle = "#9beb42";
                ctx.fillRect(p.x + 8, 0, 6, p.top);
                ctx.fillStyle = "#529416";
                ctx.fillRect(p.x + pipeWidth - 14, 0, 6, p.top);

                ctx.fillStyle = "#73bf2e";
                ctx.fillRect(p.x - 3, p.top - 24, pipeWidth + 6, 24);
                ctx.strokeRect(p.x - 3, p.top - 24, pipeWidth + 6, 24);
                ctx.fillStyle = "#9beb42";
                ctx.fillRect(p.x + 5, p.top - 22, 6, 20);

                let bottomPipeY = p.top + pipeGap;
                ctx.fillStyle = "#73bf2e";
                ctx.fillRect(p.x, bottomPipeY, pipeWidth, groundY - bottomPipeY);
                ctx.strokeRect(p.x, bottomPipeY, pipeWidth, groundY - bottomPipeY + 4);

                ctx.fillStyle = "#9beb42";
                ctx.fillRect(p.x + 8, bottomPipeY, 6, groundY - bottomPipeY);
                ctx.fillStyle = "#529416";
                ctx.fillRect(p.x + pipeWidth - 14, bottomPipeY, 6, groundY - bottomPipeY);

                ctx.fillStyle = "#73bf2e";
                ctx.fillRect(p.x - 3, bottomPipeY, pipeWidth + 6, 24);
                ctx.strokeRect(p.x - 3, bottomPipeY, pipeWidth + 6, 24);
                ctx.fillStyle = "#9beb42";
                ctx.fillRect(p.x + 5, bottomPipeY + 2, 6, 20);
            }
        }

        function drawEnvironmentLayout() {
            ctx.fillStyle = "#64b3ba"; 
            ctx.fillRect(0, groundY - 50, canvas.width, 50);
            
            ctx.fillStyle = "#4ca664";
            for (let i = 0; i < canvas.width; i += 80) {
                ctx.beginPath();
                ctx.arc(i + 40, groundY, 35, Math.PI, 0);
                ctx.fill();
            }

            ctx.fillStyle = "#ddd894"; 
            ctx.fillRect(0, groundY, canvas.width, groundHeight);

            ctx.fillStyle = "#53bf33";
            ctx.fillRect(0, groundY, canvas.width, 14);
            
            ctx.fillStyle = "#429429"; 
            ctx.lineWidth = 2;
            for (let x = groundScrollX; x < canvas.width + 32; x += 18) {
                ctx.beginPath();
                ctx.moveTo(x, groundY);
                ctx.lineTo(x - 10, groundY + 14);
                ctx.lineTo(x - 4, groundY + 14);
                ctx.lineTo(x + 6, groundY);
                ctx.closePath();
                ctx.fill();
            }

            ctx.fillStyle = "#000";
            ctx.fillRect(0, groundY, canvas.width, 3);
        }

        function drawInterfaceHUD() {
            ctx.fillStyle = "#fff";
            ctx.strokeStyle = "#000";
            ctx.lineWidth = 4;
            ctx.font = "bold 32px 'Courier New'";
            ctx.textAlign = "center";

            if (!gameOver) {
                ctx.strokeText(score, canvas.width / 2, 60);
                ctx.fillText(score, canvas.width / 2, 60);
            } else {
                ctx.fillStyle = "rgba(0,0,0,0.75)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = "#e40010";
                ctx.font = "bold 36px 'Courier New'";
                ctx.strokeText("GAME OVER", canvas.width / 2, canvas.height / 2 - 40);
                ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 40);

                ctx.fillStyle = "#fff";
                ctx.font = "bold 20px 'Courier New'";

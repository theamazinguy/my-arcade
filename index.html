<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Arcade</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#020412,#071d42,#010308);
    color:white;
    overflow-x:hidden;
}

/* Navigation */

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 8%;
    background:rgba(0,0,0,.4);
    backdrop-filter:blur(12px);
    position:sticky;
    top:0;
}

.logo{
    font-size:32px;
    color:#00e5ff;
    font-weight:bold;
    text-shadow:0 0 20px #00e5ff;
}

nav ul{
    display:flex;
    list-style:none;
    gap:25px;
}

nav a{
    color:white;
    text-decoration:none;
    transition:.3s;
}

nav a:hover{
    color:#00e5ff;
}

/* Hero */

.hero{
    text-align:center;
    padding:100px 20px;
}

.hero h1{
    font-size:65px;
    color:#00e5ff;
    text-shadow:0 0 25px #00e5ff;
}

.hero p{
    margin-top:20px;
    font-size:22px;
    color:#ccc;
}

.search{
    margin-top:35px;
}

.search input{
    width:320px;
    padding:15px;
    border:none;
    border-radius:30px;
    outline:none;
    font-size:18px;
}

.games{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:30px;
    padding:60px;
}

.card{
    background:rgba(255,255,255,.08);
    border:1px solid #00e5ff55;
    border-radius:20px;
    padding:35px;
    text-align:center;
    transition:.35s;
}

.card:hover{
    transform:translateY(-10px);
    box-shadow:0 0 30px #00e5ff;
}

.card h2{
    margin-bottom:15px;
}

button{
    margin-top:15px;
    padding:12px 30px;
    border:none;
    border-radius:30px;
    background:#00e5ff;
    color:black;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.08);
}

footer{
    text-align:center;
    padding:35px;
    color:#888;
}

</style>

</head>

<body>

<nav>

<div class="logo">🎮 My Arcade</div>

<ul>
<li><a href="#">Home</a></li>
<li><a href="#">Games</a></li>
<li><a href="#">News</a></li>
<li><a href="#">About</a></li>
</ul>

</nav>

<section class="hero">

<h1>WELCOME TO MY ARCADE</h1>

<p>Play awesome games built by TheAmazingGuy.</p>

<div class="search">
<input placeholder="Search games...">
</div>

</section>

<section class="games">

<div class="card">
<h2>🐍 Snake</h2>
<p>Coming Soon</p>
<button>Play</button>
</div>

<div class="card">
<h2>🏎 Racing</h2>
<p>Coming Soon</p>
<button>Play</button>
</div>

<div class="card">
<h2>🧟 Zombie</h2>
<p>Coming Soon</p>
<button>Play</button>
</div>

<div class="card">
<h2>⚔ RPG</h2>
<p>Coming Soon</p>
<button>Play</button>
</div>

<div class="card">
<h2>🧩 Puzzle</h2>
<p>Coming Soon</p>
<button>Play</button>
</div>

<div class="card">
<h2>🎯 Shooter</h2>
<p>Coming Soon</p>
<button>Play</button>
</div>

</section>

<footer>

© 2026 My Arcade • Created by TheAmazingGuy

</footer>

</body>
</html>
